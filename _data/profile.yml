short_bio: >-
  <p>
    Yongmao Pei is a Professor in the School of Mechanics and Engineering
    Sciences at Peking University. He received his B.S. degree in Engineering
    Mechanics and his Ph.D. degree in Solid Mechanics from Tsinghua University.
  </p>
  <p>
    His research interests include multi-field coupling mechanics of intelligent
    materials and structures, design and characterization of electromagnetic
    materials, wave manipulation, acoustic tweezers, haptic feedback, and
    micro-/nano-scale mechanics.
  </p>

