short_bio: >-
  <p>
    Yongmao Pei is a professor at the School of Mechanics & Engineering Science,
    Peking University. He received a B.S. in Engineering Mechanics and a Ph.D.
    in Solid Mechanics from Tsinghua University.
  </p>
  <p>
    His research focuses on the mechanics of smart materials and structures,
    the design and characterization of lightweight composites, experimental
    mechanics and instrumentation, acoustic-tweezer mechanisms and methods,
    and the design and fabrication of acoustofluidic microchips.
  </p>

