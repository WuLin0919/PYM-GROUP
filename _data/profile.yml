short_bio: >-
  <p>
    Yongmao Pei is a Professor in the School of Mechanics and Engineering
    Sciences at Peking University. He received his B.S. degree in Engineering
    Mechanics and his Ph.D. degree in Solid Mechanics from Tsinghua University.
  </p>
  <p>
    He has long been engaged in the mechanics of intelligent materials and
    structures, mechanical design and characterization of lightweight composite
    materials, experimental mechanics and instrument development, mechanisms,
    methods, and experimental characterization of acoustic tweezers, and the
    design and fabrication of acoustofluidic microchips.
  </p>

