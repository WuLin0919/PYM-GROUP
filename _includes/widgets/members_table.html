<section class="member-section{% unless forloop.last %} mb-3{% endunless %}">
    <div class="font-weight-bold mb-2">{{ include.title }}</div>
    <div class="table-responsive">
        <table class="table table-sm member-table mb-0">
            <thead>
                <tr>
                    <th scope="col">Name</th>
                    <th scope="col">Degree / Position</th>
                    <th scope="col">Period</th>
                    <th scope="col">Destination</th>
                </tr>
            </thead>
            <tbody>
                {% for member in include.members %}
                <tr>
                    <td class="member-name">
                        {% if member.link %}
                        <a href="{{ member.link }}" target="_blank" rel="noopener noreferrer">
                            {{ member.name }}
                            <i class="fas fa-up-right-from-square member-link-icon" aria-hidden="true"></i>
                        </a>
                        {% else %}
                        {{ member.name }}
                        {% endif %}
                    </td>
                    <td>{{ member.degree }}</td>
                    <td class="no-break">{{ member.period }}</td>
                    <td>{{ member.destination }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</section>
